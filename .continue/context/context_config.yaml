# .continue/config.yaml
# Единый файл конфигурации контекста для ALPHAMETERQC
name: Main context
version: 1.0.0
schema: v1

# Список провайдеров контекста.
# Те, что в списке (без #), будут загружаться всегда.
# Те, что закомментированы (#), можно включить по мере необходимости.

context:
  # === БАЗОВЫЕ (Всегда активны) ===
  # Эти провайдеры критически важны для понимания структуры проекта и текущей работы.

  - name: repo-map
    # Карта репозитория: показывает структуру папок и файлов.
    # Помогает ИИ понимать, где находится текущий файл относительно других.
    provider: repo-map

  - name: currentFile
    # Текущий открытый файл: содержимое файла, который вы сейчас редактируете.
    provider: currentFile

  - name: code
    # Код: ссылки на конкретные функции, классы и методы из всего проекта.
    # Позволяет ИИ видеть определения функций, даже если они в других файлах.
    provider: code

  - name: diff
    # Git Diff: показывает ваши текущие несохраненные изменения.
    # Важно, чтобы ИИ видел, что вы уже поменяли, но еще не закоммитили.
    provider: diff

  - name: problems
    # Ошибки и предупреждения: данные из панели "Problems" в IDE.
    # Помогает ИИ видеть синтаксические ошибки и линтинговые предупреждения.
    provider: problems

  - name: terminal
    # Вывод терминала: последние команды и их вывод.
    # Полезно, если вы только что запустили скрипт и получили ошибку.
    provider: terminal

  - name: os
    # Информация об ОС: версия системы, путь к проекту и т.д.
    # Редко нужно для написания кода, но может быть полезно для отладки окружения.
    provider: os

  - name: open
    # Открытые файлы: содержимое всех файлов, открытых в вкладках редактора.
    # Полезно для быстрого контекста, но может "зашумлять" ответ, если вкладок много.
    provider: open

  - name: file
    # Конкретный файл: позволяет явно указать ИИ прочитать определенный файл.
    # Обычно вызывается командой "/file".
    provider: file

  # === ОПЦИОНАЛЬНЫЕ (Закомментированы) ===
  # Включайте (убирайте #) только когда они нужны для конкретной задачи.

  # - name: http
  #   # Веб-контент: позволяет ИИ читать содержимое URL.
  #   # Полезно, если вы просите проанализировать документацию по ссылке.
  #   provider: http

  # - name: clipboard
  #   # Буфер обмена: содержимое вашего буфера обмена.
  #   # Полезно, если вы скопировали кусок кода и хотите его обсудить.
  #   provider: clipboard

  # - name: debugger
  #   # Отладчик: переменные и стек вызовов во время отладки.
  #   # Включайте только когда используете режим отладки.
  #   provider: debugger

  - name: tree
    # Дерево файлов: упрощенное представление структуры папок.
    # Часто дублирует функционал repo-map, поэтому отключен для экономии токенов.
    provider: tree
