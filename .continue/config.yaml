name: AlphaMeterQC
version: 1.0.0
schema: v1

models:
  # ====== Yandex Cloud Models ======
  - name: Qwen3 235B
    model: gpt://${{ secrets.AISTUDIO_FOLDER_ID }}/qwen3-235b-a22b-fp8
    provider: openai
    apiBase: https://ai.api.cloud.yandex.net/v1
    apiKey: ${{ secrets.AISTUDIO_API_KEY }}
    requestOptions:
      headers:
        OpenAI-Project: ${{ secrets.AISTUDIO_FOLDER_ID }}

  - name: DeepSeek V4 Flash
    provider: openai
    apiBase: https://ai.api.cloud.yandex.net/v1
    apiKey: ${{ secrets.AISTUDIO_API_KEY }}
    model: gpt://${{ secrets.AISTUDIO_FOLDER_ID }}/deepseek-v4-flash/latest
    requestOptions:
      headers:
        OpenAI-Project: ${{ secrets.AISTUDIO_FOLDER_ID }}

  - name: Qwen3.6-35B
    provider: openai
    apiBase: https://ai.api.cloud.yandex.net/v1
    apiKey: ${{ secrets.AISTUDIO_API_KEY }}
    model: gpt://${{ secrets.AISTUDIO_FOLDER_ID }}/qwen3.6-35b-a3b
    requestOptions:
      headers:
        OpenAI-Project: ${{ secrets.AISTUDIO_FOLDER_ID }}

  - name: gpt-oss-20b
    provider: openai
    apiBase: https://ai.api.cloud.yandex.net/v1
    apiKey: ${{ secrets.AISTUDIO_API_KEY }}
    model: gpt://${{ secrets.AISTUDIO_FOLDER_ID }}/gpt-oss-20b/latest
    requestOptions:
      headers:
        OpenAI-Project: ${{ secrets.AISTUDIO_FOLDER_ID }}

  - name: Alice AI LLM Flash
    provider: openai
    apiBase: https://ai.api.cloud.yandex.net/v1
    apiKey: ${{ secrets.AISTUDIO_API_KEY }}
    model: gpt://${{ secrets.AISTUDIO_FOLDER_ID }}/aliceai-llm-flash/latest
    requestOptions:
      headers:
        OpenAI-Project: ${{ secrets.AISTUDIO_FOLDER_ID }}

  # ====== Ollama Local Models ======
  - name: mistral:7b
    provider: ollama
    apiBase: http://localhost:11434
    model: mistral:7b

  - name: qwen2.5:7b
    provider: ollama
    apiBase: http://localhost:11434
    model: qwen2.5:7b

  - name: qwen3.5:4b
    provider: ollama
    apiBase: http://localhost:11434
    model: qwen3.5:4b

  - name: deepseek-coder:6.7b
    provider: ollama
    apiBase: http://localhost:11434
    model: deepseek-coder:6.7b

  - name: qwen2.5-coder:7b
    provider: ollama
    apiBase: http://localhost:11434
    model: qwen2.5-coder:7b

  - name: qwen2.5-coder:3b
    provider: ollama
    apiBase: http://localhost:11434
    model: qwen2.5-coder:3b

  - name: qwen2.5-coder:1.5b
    provider: ollama
    apiBase: http://localhost:11434
    model: qwen2.5-coder:1.5b

  - name: nomic-embed
    provider: ollama
    apiBase: http://localhost:11434
    model: nomic-embed-text:latest
