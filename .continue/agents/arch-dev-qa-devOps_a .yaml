name: Arch-Dev-QA-DevOps - Advanced
version: 1.0.0
schema: v1

models:
  # ========= Чат и сабджент =========
  - name: DeepSeek V4 Flash
    provider: openai
    model: gpt://${{ secrets.AISTUDIO_FOLDER_ID }}/deepseek-v4-flash/latest
    apiBase: https://ai.api.cloud.yandex.net/v1
    apiKey: ${{ secrets.AISTUDIO_API_KEY }}
    requestOptions:
      headers:
        OpenAI-Project: ${{ secrets.AISTUDIO_FOLDER_ID }}
    roles:
      - chat
      - subagent
    capabilities:
      - tool_use
    defaultCompletionOptions:
      contextLength: 32768 # 16384 | 65536 | 131072 (32768 — баланс между объёмом контекста и потреблением ресурсов)
      maxTokens: 2048 # 1024 | 4096 (2048 — достаточный объём для развёрнутых ответов без излишнего расхода токенов)
      temperature: 0.2 # 0.0 | 0.5 (0.2 — оптимальный уровень для креативных архитектурных решений, обеспечивает баланс между случайностью и предсказуемостью)
      topP: 0.9 # 0.8 | 1.0 (0.9 — стабильность без излишней жёсткости, позволяет разнообразие при сохранении релевантности)
      reasoning: false
      promptCaching: true
    cacheBehavior:
      cacheSystemMessage: true
      cacheConversation: true

  # ========= Редактирование и применение =========
  - name: Qwen3.6-35B
    provider: openai
    model: gpt://${{ secrets.AISTUDIO_FOLDER_ID }}/qwen3.6-35b/latest
    apiBase: https://ai.api.cloud.yandex.net/v1
    apiKey: ${{ secrets.AISTUDIO_API_KEY }}
    requestOptions:
      headers:
        OpenAI-Project: ${{ secrets.AISTUDIO_FOLDER_ID }}
    roles:
      - edit
      - apply
    capabilities:
      - tool_use
      - image_input
    defaultCompletionOptions:
      contextLength: 32768 # 16384 | 65536 | 131072 (32768 — баланс между скоростью и качеством для редактирования и применения)
      maxTokens: 2048 # 1024 | 4096 (2048 — достаточно для развёрнутых ответов при редактировании кода/архитектуры)
      temperature: 0.1 # 0.0 | 0.3 (0.1 — точность для кода и архитектурных решений, минимизирует случайные отклонения)
      topP: 0.9 # 0.8 | 1.0 (0.9 — стабильность без излишней жёсткости)
    cacheBehavior:
      cacheSystemMessage: true
      cacheConversation: true

  # ========= Суммаризация =========
  - name: Alice AI LLM Flash
    provider: openai
    model: gpt://${{ secrets.AISTUDIO_FOLDER_ID }}/aliceai-llm-flash/latest
    apiBase: https://ai.api.cloud.yandex.net/v1
    apiKey: ${{ secrets.AISTUDIO_API_KEY }}
    requestOptions:
      headers:
        OpenAI-Project: ${{ secrets.AISTUDIO_FOLDER_ID }}
    roles:
      - summarize
    defaultCompletionOptions:
      contextLength: 32768 # 16384 | 65536 (32768 — достаточно для контекста при суммаризации)
      maxTokens: 1024 # 512 | 2048 (1024 — оптимальная длина для краткой суммаризации, сохраняет суть без излишеств)
      temperature: 0.3 # 0.1 | 0.5 (0.3 — баланс между сжатием и связностью текста)
      topP: 0.9 # 0.8 | 1.0 (0.9 — стабильность без излишней жёсткости)
      reasoning: false
      promptCaching: true
    cacheBehavior:
      cacheSystemMessage: true
      cacheConversation: true

  # ========= Автодополнение (локальный coder) =========
  - name: qwen2.5-coder:3b
    provider: ollama
    model: qwen2.5-coder:3b
    apiBase: http://localhost:11434
    roles:
      - autocomplete
    defaultCompletionOptions:
      contextLength: 2048 # 1024 | 4096 (2048 — оптимально для автодополнения, обеспечивает достаточный контекст без излишнего расхода памяти)
      maxTokens: 256 # 128 | 512 (256 — типичная длина продолжения кода, достаточна для большинства сценариев)
      temperature: 0.1 # 0.0 | 0.2 (0.1 — предсказуемость, минимизирует случайные отклонения в коде)
      topP: 0.85 # 0.8 | 0.95 (0.85 — стабильность, обеспечивает разнообразие без потери релевантности)
      stop:
        - Í
        - \n\n
    autocompleteOptions:
      maxPromptTokens: 500 # 300 | 800 (500 — баланс между объёмом контекста и скоростью обработки)
      prefixPercentage: 0.6 # 0.5 | 0.8 (0.6 — больше внимания префиксу, помогает точнее продолжить существующий код)
      maxSuffixPercentage: 0.2 # 0.1 | 0.3 (0.3 — достаточно суффикса для осмысленного продолжения, не перегружает модель)
      useCache: true
      useImports: true
      useRecentlyEdited: true
      useRecentlyOpened: false
      onlyMyCode: true
    capabilities: []

  # ========= Эмбеддинги =========
  - name: nomic-embed
    provider: ollama
    model: nomic-embed-text:latest
    apiBase: http://localhost:11434
    roles:
      - embed
