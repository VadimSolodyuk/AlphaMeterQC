name: Project Manager - Maximal
version: 1.0.0
schema: v1

models:
  # ========= Чат =========
  - name: Qwen3 235B
    provider: openai
    model: gpt://${{ secrets.AISTUDIO_FOLDER_ID }}/qwen3-235b-a22b-fp8
    apiBase: https://ai.api.cloud.yandex.net/v1
    apiKey: ${{ secrets.AISTUDIO_API_KEY }}
    requestOptions:
      headers:
        OpenAI-Project: ${{ secrets.AISTUDIO_FOLDER_ID }}
    roles:
      - chat
    defaultCompletionOptions:
      contextLength: 32768 # 65536 | 131072 | 262144 (131072 — максимальный контекст для глубокого анализа требований и планирования)
      maxTokens: 4096 # 2048 | 4096 (4096 — для развёрнутых ответов PM)
      temperature: 0.3 # 0.2 | 0.3 | 0.5 (0.3 — баланс точности и креативности)
      topP: 0.95 # 0.9 | 0.95 | 1.0 (0.95 — умеренная вариативность)
      reasoning: false
      promptCaching: true
    cacheBehavior:
      cacheSystemMessage: true
      cacheConversation: true

  # ========= Сабджент (подзадачи) =========
  - name: DeepSeek V4 Flash
    provider: openai
    model: gpt://${{ secrets.AISTUDIO_FOLDER_ID }}/deepseek-v4-flash/latest
    apiBase: https://ai.api.cloud.yandex.net/v1
    apiKey: ${{ secrets.AISTUDIO_API_KEY }}
    requestOptions:
      headers:
        OpenAI-Project: ${{ secrets.AISTUDIO_FOLDER_ID }}
    roles:
      - subagent
    defaultCompletionOptions:
      contextLength: 32768 # 16384 | 32768 | 65536 (32768 — достаточно для подзадач PM: суммаризация, обновление статусов)
      maxTokens: 2048 # 1024 | 2048 (2048 — компактные ответы)
      temperature: 0.2 # 0.1 | 0.2 | 0.3 (0.2 — точность)
      topP: 0.9
      reasoning: false
      promptCaching: true
    cacheBehavior:
      cacheSystemMessage: true
      cacheConversation: true

  # ========= Редактирование и применение =========
  - name: Alice AI LLM Flash
    provider: openai
    model: gpt://${{ secrets.AISTUDIO_FOLDER_ID }}/aliceai-llm-flash/latest
    apiBase: https://ai.api.cloud.yandex.net/v1
    apiKey: ${{ secrets.AISTUDIO_API_KEY }}
    requestOptions:
      headers:
        OpenAI-Project: ${{ secrets.AISTUDIO_FOLDER_ID }}
    roles:
      - edit
      - apply
    defaultCompletionOptions:
      contextLength: 16384 # 8192 | 16384 | 32768 (16384 — для правок Markdown, списков, JSON-конфигов)
      maxTokens: 1024 # 1024 | 2048 (2048 — достаточно для
      temperature: 0.1 # 0.0 | 0.1 | 0.2 (0.1 — макс. детерминированность)
      topP: 0.9
      reasoning: false
      promptCaching: true
    cacheBehavior:
      cacheSystemMessage: true
      cacheConversation: true

  # ========= Суммаризация =========
  - name: Alice AI LLM Flash
    provider: openai
    model: gpt://${{ secrets.AISTUDIO_FOLDER_ID }}/aliceai-llm-flash/latest
    apiBase: https://ai.api.cloud.yandex.net/v1
    apiKey: ${{ secrets.AISTUDIO_API_KEY }}
    requestOptions:
      headers:
        OpenAI-Project: ${{ secrets.AISTUDIO_FOLDER_ID }}
    roles:
      - summarize
    defaultCompletionOptions:
      contextLength: 32768 # 16384 | 32768 | 65536 (32768 — для длинных диалогов)
      maxTokens: 2048 # 1024 | 2048 (2048 — полные итоги)
      temperature: 0.2 # 0.2 | 0.3 | 0.5 (0.3 — лёгкое разнообразие)
      topP: 0.9
      reasoning: false
      promptCaching: true
    cacheBehavior:
      cacheSystemMessage: true
      cacheConversation: true

  # ========= Автодополнение (локальный coder) =========
  - name: qwen2.5-coder:3b
    provider: ollama
    model: qwen2.5-coder:3b
    apiBase: http://localhost:11434
    roles:
      - autocomplete
    defaultCompletionOptions:
      contextLength: 2048 # 1024 | 2048 | 4096 (2048 — достаточно для контекста редактирования)
      maxTokens: 256 # 128 | 256 | 512 (256 — оптимально для коротких дополнений)
      temperature: 0.1 # 0.0 | 0.1 | 0.2 (0.1 — предсказуемость)
      topP: 0.85
      stop:
        - </s>
        - "\n\n"
        - ";"
        - "}"
        - "#"
    autocompleteOptions:
      maxPromptTokens: 300 # 300 | 500 | 800 (500 — баланс)
      prefixPercentage: 0.6
      maxSuffixPercentage: 0.2
      useCache: true
      useImports: true
      useRecentlyEdited: true
      useRecentlyOpened: false
      onlyMyCode: true

  # ========= Эмбеддинги =========
  - name: nomic-embed
    provider: ollama
    model: nomic-embed-text:latest
    apiBase: http://localhost:11434
    roles:
      - embed
