name: Arch-Dev-QA-DevOps - Optimal
version: 1.0.0
schema: v1

models:
  # ========= Чат и сабджент =========
  - name: Qwen3.6-35B
    provider: openai
    model: gpt://${{ secrets.AISTUDIO_FOLDER_ID }}/qwen3.6-35b/latest
    apiBase: https://ai.api.cloud.yandex.net/v1
    apiKey: ${{ secrets.AISTUDIO_API_KEY }}
    requestOptions:
      headers:
        OpenAI-Project: ${{ secrets.AISTUDIO_FOLDER_ID }}
    roles:
      - chat
      - subagent
    capabilities:
      - tool_use
      - image_input
    defaultCompletionOptions:
      contextLength: 32768 # возможные: 16384, 65536, 131072 (32768 — баланс скорость/качество)
      maxTokens: 2048 # возможные: 1024, 4096 (2048 — достаточно для ответов)
      temperature: 0.2 # возможные: 0.0–0.3 (0.1 — точность для кода/архитектуры)
      topP: 0.9 # возможные: 0.8–1.0 (0.9 — стабильность без излишней жёсткости)
      reasoning: false # возможные: true/false (false — быстрее, true — глубже)
      promptCaching: true # возможные: true/false (true — экономия токенов)
    cacheBehavior:
      cacheSystemMessage: true
      cacheConversation: true

  # ========= Редактирование и применение =========
  - name: gpt-oss-20b
    provider: openai
    model: gpt://${{ secrets.AISTUDIO_FOLDER_ID }}/gpt-oss-20b/latest
    apiBase: https://ai.api.cloud.yandex.net/v1
    apiKey: ${{ secrets.AISTUDIO_API_KEY }}
    requestOptions:
      headers:
        OpenAI-Project: ${{ secrets.AISTUDIO_FOLDER_ID }}
    roles:
      - edit
      - apply
    capabilities:
      - tool_use
      - image_input
    defaultCompletionOptions:
      contextLength: 32768 # возможные: 16384, 65536 (32768 — достаточно для правок)
      maxTokens: 2048 # возможные: 1024, 4096 (2048 — типичный размер правки)
      temperature: 0.1 # возможные: 0.0–0.2 (0.1 — минимальная креативность)
      topP: 0.9 # возможные: 0.8–1.0
      reasoning: false # возможные: true/false (false — быстрее)
      promptCaching: true
    cacheBehavior:
      cacheSystemMessage: true
      cacheConversation: true

  # ========= Суммаризация =========
  - name: Alice AI LLM Flash
    provider: openai
    model: gpt://${{ secrets.AISTUDIO_FOLDER_ID }}/aliceai-llm-flash/latest
    apiBase: https://ai.api.cloud.yandex.net/v1
    apiKey: ${{ secrets.AISTUDIO_API_KEY }}
    requestOptions:
      headers:
        OpenAI-Project: ${{ secrets.AISTUDIO_FOLDER_ID }}
    roles:
      - summarize
    defaultCompletionOptions:
      contextLength: 32768 # возможные: 16384, 65536 (32768 — достаточно для контекста)
      maxTokens: 1024 # возможные: 512, 2048 (1024 — краткая суммаризация)
      temperature: 0.3 # возможные: 0.1–0.5 (0.3 — баланс сжатия и связности)
      topP: 0.9
      reasoning: false
      promptCaching: true
    cacheBehavior:
      cacheSystemMessage: true
      cacheConversation: true

  # ========= Автодополнение (локальный coder) =========
  - name: qwen2.5-coder:3b
    provider: ollama
    model: qwen2.5-coder:3b
    apiBase: http://localhost:11434
    roles:
      - autocomplete
    defaultCompletionOptions:
      contextLength: 2048 # возможные: 1024, 4096 (2048 — оптимально для автодополнения)
      maxTokens: 256 # возможные: 128, 512 (256 — типичная длина продолжения)
      temperature: 0.1 # возможные: 0.0–0.2 (0.1 — предсказуемость)
      topP: 0.85 # возможные: 0.8–0.95 (0.85 — стабильность)
      stop:
        - </s>
        - \n\n
    autocompleteOptions:
      maxPromptTokens: 500 # возможные: 300, 800 (500 — баланс контекста и скорости)
      prefixPercentage: 0.6 # возможные: 0.5–0.8 (0.6 — больше внимания префиксу)
      maxSuffixPercentage: 0.3 # возможные: 0.1–0.3 (0.3 — достаточно суффикса)
      useCache: true
      useImports: true
      useRecentlyEdited: true
      useRecentlyOpened: false
      onlyMyCode: true
    capabilities: []

  # ========= Эмбеддинги =========
  - name: nomic-embed
    provider: ollama
    model: nomic-embed-text:latest
    apiBase: http://localhost:11434
    roles:
      - embed
