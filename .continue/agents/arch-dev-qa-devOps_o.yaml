name: Arch-Dev-QA-DevOps - Optimal
version: 1.0.0
schema: v1

models:
  # ========= Чат и сабджент =========
  - name: Qwen3.6-35B
    provider: openai
    model: gpt://${{ secrets.AISTUDIO_FOLDER_ID }}/qwen3.6-35b-a3b
    apiBase: https://ai.api.cloud.yandex.net/v1
    apiKey: ${{ secrets.AISTUDIO_API_KEY }}
    requestOptions:
      headers:
        OpenAI-Project: ${{ secrets.AISTUDIO_FOLDER_ID }}
    roles:
      - chat
      - subagent
    defaultCompletionOptions:
      contextLength: 32768 # 16384 | 65536 | 131072 (32768 — баланс скорость/качество)
      maxTokens: 2048 # 1024 | 4096 (2048 — достаточно для ответов)
      temperature: 0.2 # 0.0 | 0.1 | 0.2 | 0.3 (0.1 — точность для кода/архитектуры)
      topP: 0.9 # 0.8 | 0.9 | 1.0 (0.9 — стабильность без излишней жёсткости)
      reasoning: false # true | false (false — быстрее, true — глубже)
      promptCaching: true # true | false (true — экономия токенов)
    cacheBehavior:
      cacheSystemMessage: true
      cacheConversation: true

  # ========= Редактирование и применение =========
  - name: gpt-oss-20b
    provider: openai
    model: gpt://${{ secrets.AISTUDIO_FOLDER_ID }}/gpt-oss-20b/latest
    apiBase: https://ai.api.cloud.yandex.net/v1
    apiKey: ${{ secrets.AISTUDIO_API_KEY }}
    requestOptions:
      headers:
        OpenAI-Project: ${{ secrets.AISTUDIO_FOLDER_ID }}
    roles:
      - edit
      - apply
    defaultCompletionOptions:
      contextLength: 16384 # 16384 | 65536 (32768 — достаточно для правок)
      maxTokens: 2048 # 1024 | 4096 (2048 — типичный размер правки)
      temperature: 0.1 # 0.0 | 0.1 | 0.2 (0.1 — минимальная креативность)
      topP: 0.9 # 0.8 | 0.9 | 1.0
      reasoning: false # true | false (false — быстрее)
      promptCaching: true # true | false
    cacheBehavior:
      cacheSystemMessage: true
      cacheConversation: true

  # ========= Суммаризация =========
  - name: Alice AI LLM Flash
    provider: openai
    model: gpt://${{ secrets.AISTUDIO_FOLDER_ID }}/aliceai-llm-flash/latest
    apiBase: https://ai.api.cloud.yandex.net/v1
    apiKey: ${{ secrets.AISTUDIO_API_KEY }}
    requestOptions:
      headers:
        OpenAI-Project: ${{ secrets.AISTUDIO_FOLDER_ID }}
    roles:
      - summarize
    defaultCompletionOptions:
      contextLength: 32768 # 16384 | 65536 (32768 — достаточно для контекста)
      maxTokens: 2048 # 512 | 2048 (1024 — краткая суммаризация)
      temperature: 0.3 # 0.1 | 0.2 | 0.3 | 0.5 (0.3 — баланс сжатия и связности)
      topP: 0.9 # 0.8 | 0.9 | 1.0
      reasoning: false # true | false
      promptCaching: true # true | false
    cacheBehavior:
      cacheSystemMessage: true
      cacheConversation: true

  # ========= Автодополнение (локальный coder) =========
  - name: qwen2.5-coder:3b
    provider: ollama
    model: qwen2.5-coder:3b
    apiBase: http://localhost:11434
    roles:
      - autocomplete
    defaultCompletionOptions:
      contextLength: 2048 # 1024 | 2048 | 4096 (2048 — оптимально для автодополнения)
      maxTokens: 256 # 128 | 256 | 512 (256 — типичная длина продолжения)
      temperature: 0.1 # 0.0 | 0.1 | 0.2 (0.1 — предсказуемость)
      topP: 0.85 # 0.8 | 0.85 | 0.9 | 0.95 (0.85 — стабильность)
      stop:
        - </s>
        - "\n\n"
        - ";"
        - "}"
        - "#"
    autocompleteOptions:
      maxPromptTokens: 300 # 300 | 500 | 800 (500 — баланс контекста и скорости)
      prefixPercentage: 0.6 # 0.5 | 0.6 | 0.8 (0.6 — больше внимания префиксу)
      maxSuffixPercentage: 0.2 # 0.1 | 0.2 | 0.3 (0.3 — достаточно суффикса)
      useCache: true # true | false
      useImports: true # true | false
      useRecentlyEdited: true # true | false
      useRecentlyOpened: false # true | false
      onlyMyCode: true # true | false
    capabilities: []

  # ========= Эмбеддинги =========
  - name: nomic-embed
    provider: ollama
    model: nomic-embed-text:latest
    apiBase: http://localhost:11434
    roles:
      - embed
