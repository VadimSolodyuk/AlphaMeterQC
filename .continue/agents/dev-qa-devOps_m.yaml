name: Dev-QA-DevOps - Minimal
version: 1.0.0
schema: v1

models:
  - name: gpt-oss-20b
    provider: openai
    model: gpt://${{ secrets.AISTUDIO__FOLDER_ID }}/gpt-oss-20b/latest
    apiBase: https://ai.api.cloud.yandex.net/v1
    apiKey: ${{ secrets.AISTUDIO_API_KEY }}
    requestOptions:
      headers:
        OpenAI-Project: ${{ secrets.AISTUDIO__FOLDER_ID }}
    roles:
      - chat
      - edit
      - apply
    capabilities:
      - tool_use
      - image_input
    defaultCompletionOptions:
      contextLength: 32768
      maxTokens: 2048 # 4096
      temperature: 0.1 # 0.1 — точность для кода и QA (Dev-QA-DevOps)
      topP: 0.9
      reasoning: false
      # reasoningBudgetTokens:
      promptCaching: true
    cacheBehavior:
      cacheSystemMessage: true # Системные промпты (роли BA)
      cacheConversation: true

  - name: qwen2.5-coder:3b-ac
    provider: ollama
    model: qwen2.5-coder:3b
    apiBase: http://localhost:11434
    roles:
      - autocomplete
    defaultCompletionOptions:
      contextLength: 2048 # 4096
      maxTokens: 256 # 256 # Для автодополнения обычно нужно 256-512. Для чата — 2048-4096 достаточно.
      temperature: 0.1 # 0.1 — точность для автодополнения кода
      topP: 0.85
      stop:
        - </s>
        - \n\n # для autocomplete
    autocompleteOptions:
      maxPromptTokens: 500 # 300 | 800
      prefixPercentage: 0.6 # 0.8 | 0.5
      maxSuffixPercentage: 0.2 # 0.1 | 0.3
      useCache: true
      useImports: true
      useRecentlyEdited: true
      useRecentlyOpened: false
      onlyMyCode: true
    capabilities: []

  - name: nomic-embed
    provider: ollama
    model: nomic-embed-text:latest
    apiBase: http://localhost:11434
    roles:
      - embed
