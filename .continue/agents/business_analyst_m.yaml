name: Business Analyst - Maximal
version: 1.0.0
schema: v1

models:
  # ========= Чат и сабджент =========
  - name: Qwen3 235B
    provider: openai
    model: gpt://${{ secrets.AISTUDIO__FOLDER_ID }}/qwen3-235b-a22b-fp8
    apiBase: https://ai.api.cloud.yandex.net/v1
    apiKey: ${{ secrets.AISTUDIO_API_KEY }}
    requestOptions:
      headers:
        OpenAI-Project: ${{ secrets.AISTUDIO_FOLDER_ID }}
    roles:
      - chat
      - subagent
    defaultCompletionOptions:
      contextLength: 32768 # 32768 | 65536 | 131072 (65536 — макс. контекст для глубокого анализа требований)
      maxTokens: 4096 # 2048 | 4096 (4096 — для развёрнутых ответов BA)
      temperature: 0.3 # 0.3 — баланс точности и креативности для анализа требований
      topP: 0.95
      reasoning: false
      promptCaching: true
    cacheBehavior:
      cacheSystemMessage: true
      cacheConversation: true

  # ========= Редактирование и применение =========
  - name: Qwen3.6-35B
    provider: openai
    model: gpt://${{ secrets.AISTUDIO_FOLDER_ID }}/qwen3.6-35b-a3b
    apiBase: https://ai.api.cloud.yandex.net/v1
    apiKey: ${{ secrets.AISTUDIO_API_KEY }}
    requestOptions:
      headers:
        OpenAI-Project: ${{ secrets.AISTUDIO_FOLDER_ID }}
    roles:
      - edit
      - apply
    defaultCompletionOptions:
      contextLength: 16384 # 8192 | 16384 | 32768 (32768 — достаточно для правок документов BA)
      maxTokens: 2048 # 1024 | 2048 | 4096 (2048 — для точных изменений без избыточности)
      temperature: 0.1 # 0.0 | 0.1 | 0.2 (0.1 — макс. детерминированность для правок)
      topP: 0.9
      reasoning: false
      promptCaching: true
    cacheBehavior:
      cacheSystemMessage: true
      cacheConversation: true

  # ========= Суммаризация =========
  - name: DeepSeek V4 Flash
    provider: openai
    model: gpt://${{ secrets.AISTUDIO_FOLDER_ID }}/deepseek-v4-flash/latest
    apiBase: https://ai.api.cloud.yandex.net/v1
    apiKey: ${{ secrets.AISTUDIO_API_KEY }}
    requestOptions:
      headers:
        OpenAI-Project: ${{ secrets.AISTUDIO_FOLDER_ID }}
    roles:
      - summarize
    defaultCompletionOptions:
      contextLength: 32768 # 8192 | 16384 | 32768 (32768 — для длинных логов/требований)
      maxTokens: 2048 # 1024 | 2048 | 4096 (2048 — для полных итогов)
      temperature: 0.3 # 0.0 | 0.1 | 0.2 | 0.3 (0.3 — лёгкое разнообразие при сохранении точности)
      topP: 0.9
      reasoning: false
      promptCaching: true
    cacheBehavior:
      cacheSystemMessage: true
      cacheConversation: true

  # ========= Автодополнение (локальный coder) =========
  - name: qwen2.5-coder:3b
    provider: ollama
    model: qwen2.5-coder:3b
    apiBase: http://localhost:11434
    roles:
      - autocomplete
    defaultCompletionOptions:
      contextLength: 2048 # 4096 (2048 — достаточно для контекста редактирования)
      maxTokens: 256 # 256 | 512 (256 — оптимально для коротких дополнений)
      temperature: 0.1 # 0.1 — точ
      topP: 0.85
      stop:
        - </s>
        - "\n\n"
        - ";"
        - "}"
        - "#"
    autocompleteOptions:
      maxPromptTokens: 300 # 300 | 800 (500 — баланс между объёмом контекста и скоростью обработки)
      prefixPercentage: 0.6 # 0.5 | 0.8 (0.6 — больше внимания префиксу, помогает точнее продолжить существующий код)
      maxSuffixPercentage: 0.2 # 0.1 | 0.3 (0.3 — достаточно суффикса для осмысленного продолжения, не перегружает модель)
      useCache: true
      useImports: true
      useRecentlyEdited: true
      useRecentlyOpened: false
      onlyMyCode: true
    capabilities: []

  - name: nomic-embed
    provider: ollama
    model: nomic-embed-text:latest
    apiBase: http://localhost:11434
    roles:
      - embed
