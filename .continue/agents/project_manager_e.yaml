name: Project Manager - Economical
version: 1.0.0
schema: v1

models:
  # ========= Чат =========
  - name: gpt-oss-20b
    provider: openai
    model: gpt://${{ secrets.AISTUDIO_FOLDER_ID }}/gpt-oss-20b/latest
    apiBase: https://ai.api.cloud.yandex.net/v1
    apiKey: ${{ secrets.AISTUDIO_API_KEY }}
    requestOptions:
      headers:
        OpenAI-Project: ${{ secrets.AISTUDIO_FOLDER_ID }}
    roles:
      - chat
      - subagent
    defaultCompletionOptions:
      contextLength: 32768 # 8192 | 16384 | 32768 (16384 — достаточно для суммаризации и обновления статусов)
      maxTokens: 2048 # 1024 | 2048 (2048 — компактные ответы)
      temperature: 0.3 # 0.1 | 0.2 | 0.3 (0.2 — точность)
      topP: 0.9
      reasoning: false
      promptCaching: true
    cacheBehavior:
      cacheSystemMessage: true
      cacheConversation: true

  # ========= Редактирование и применение =========
  - name: Alice AI LLM Flash
    provider: openai
    model: gpt://${{ secrets.AISTUDIO_FOLDER_ID }}/aliceai-llm-flash/latest
    apiBase: https://ai.api.cloud.yandex.net/v1
    apiKey: ${{ secrets.AISTUDIO_API_KEY }}
    requestOptions:
      headers:
        OpenAI-Project: ${{ secrets.AISTUDIO_FOLDER_ID }}
    roles:
      - edit
      - apply
    defaultCompletionOptions:
      contextLength: 16384 # 8192 | 16384 | 32768 (16384 — для правок Markdown, списков, JSON-конфигов)
      maxTokens: 1024 # 1024 | 2048 (2048 — достаточно для правок)
      temperature: 0.1 # 0.0 | 0.1 | 0.2 (0.1 — макс. детерминированность)
      topP: 0.9
      reasoning: false
      promptCaching: true
    cacheBehavior:
      cacheSystemMessage: true
      cacheConversation: true

  # ========= Суммаризация =========
  - name: Alice AI LLM Flash
    provider: openai
    model: gpt://${{ secrets.AISTUDIO_FOLDER_ID }}/aliceai-llm-flash/latest
    apiBase: https://ai.api.cloud.yandex.net/v1
    apiKey: ${{ secrets.AISTUDIO_API_KEY }}
    requestOptions:
      headers:
        OpenAI-Project: ${{ secrets.AISTUDIO_FOLDER_ID }}
    roles:
      - summarize
    defaultCompletionOptions:
      contextLength: 32768
      maxTokens: 2048 # 1024 | 2048 (2048 — полные итоги)
      temperature: 0.3 # 0.2 | 0.3 | 0.5 (0.3 — лёгкое разнообразие)
      topP: 0.9
      reasoning: false
      promptCaching: true
    cacheBehavior:
      cacheSystemMessage: true
      cacheConversation: true

  # ========= Автодополнение (локальный coder) =========
  - name: qwen2.5-coder:3b
    provider: ollama
    model: qwen2.5-coder:3b
    apiBase: http://localhost:11434
    roles:
      - autocomplete
    defaultCompletionOptions:
      contextLength: 2048 # 1024 | 2048 | 4096 (2048 — достаточно для контекста редактирования)
      maxTokens: 512 # 128 | 256 | 512 (256 — оптимально для коротких дополнений)
      temperature: 0.1 # 0.0 | 0.1 | 0.2 (0.1 — предсказуемость)
      topP: 0.85
      stop:
        - </s>
        - "\n\n"
        - ";"
        - "}"
        - "#"
    autocompleteOptions:
      maxPromptTokens: 500 # 300 | 500 | 800 (500 — баланс)
      prefixPercentage: 0.6
      maxSuffixPercentage: 0.3
      useCache: true
      useImports: true
      useRecentlyEdited: true
      useRecentlyOpened: false
      onlyMyCode: true

  # ========= Эмбеддинги =========
  - name: nomic-embed
    provider: ollama
    model: nomic-embed-text:latest
    apiBase: http://localhost:11434
    roles:
      - embed
