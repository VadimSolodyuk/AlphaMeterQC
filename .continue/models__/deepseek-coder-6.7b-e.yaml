name: deepseek-coder:6.7b-e
version: 1.0.0
schema: v1

# Define which models can be used
# https://docs.continue.dev/customization/models
models:
  - name: deepseek-coder:6.7b-e
    provider: ollama
    model: deepseek-coder:6.7b-instruct-q5_K_M
    #   apiKey: ${{ secrets.ANTHROPIC_API_KEY }}
    apiBase: http://localhost:11434
    roles:
      # - chat
      # - autocomplete
      - edit
      - apply
      # - summarize
      # - subagent
      # - rerank
      # - embed
    defaultCompletionOptions:
      contextLength: 16384 # Реалистично для 16 GB RAM 16384
      maxTokens: 2048 # Для автодополнения обычно нужно 256-512. Для чата — 2048-4096 достаточно.
      temperature: 0.1 # Для креативных задач (brainstorming архитектора) можно 0.4-0.6.
      # presencePenalty: 1.2 # Защита от зацикливания в thinking
      # topK: 0.85
      topP: 0.85
      stop:
        - </s>
        - \n\n
        - "\n```\n"
    # capabilities:
    #   - tool_use
    # - image_input

# Характеристики:

# Model
#   architecture        llama
#   parameters          7B
#   context length      16384
#   embedding length    4096
#   quantization        Q4_0

# Capabilities
#   completion

