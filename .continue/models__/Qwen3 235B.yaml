name: Qwen3 235B
version: 1.0.0
schema: v1

models:
  - name: Qwen3 235B
    provider: openai
    model: gpt://${{ secrets.AISTUDIO__FOLDER_ID }}/qwen3-235b-a22b-fp8
    apiBase: https://ai.api.cloud.yandex.net/v1
    apiKey: ${{ secrets.AISTUDIO_API_KEY }}
    requestOptions:
      headers:
        OpenAI-Project: ${{ secrets.AISTUDIO__FOLDER_ID }}
    roles:
      - chat
      - edit
      - apply
    capabilities:
      - tool_use
      - image_input
    defaultCompletionOptions:
      contextLength: 32768
      maxTokens: 4096
      temperature: 0.1
      topP: 0.9
      # reasoning_effort: "none"
