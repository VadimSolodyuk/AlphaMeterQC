name: DeepSeek V4 Flash
version: 1.0.0
schema: v1

models:
  - name: DeepSeek V4 Flash
    provider: openai
    model: gpt://${{ secrets.AISTUDIO__FOLDER_ID }}/deepseek-v4-flash/latest
    apiBase: https://ai.api.cloud.yandex.net/v1
    apiKey: ${{ secrets.AISTUDIO_API_KEY }}
    requestOptions:
      headers:
        OpenAI-Project: ${{ secrets.AISTUDIO__FOLDER_ID }}
    roles:
      - chat
      - edit
      - apply
    capabilities:
      - tool_use
      - image_input
    defaultCompletionOptions:
      contextLength: 131072
      maxTokens: 8192
      temperature: 0.2 # 0.3 — баланс точности и креативности для анализа требований (BA)
      topP: 0.9
