name: Qwen3.6-35B
version: 1.0.0
schema: v1

models:
  - name: Qwen3.6-35B
    provider: openai
    model: gpt://${{ secrets.AISTUDIO__FOLDER_ID }}/qwen3.6-35b-a3b
    apiBase: https://ai.api.cloud.yandex.net/v1
    apiKey: ${{ secrets.AISTUDIO_API_KEY }}
    requestOptions:
      headers:
        OpenAI-Project: ${{ secrets.AISTUDIO__FOLDER_ID }}
    roles:
      - chat
      - edit
      - apply
    capabilities:
      - tool_use
      - image_input
    defaultCompletionOptions:
      contextLength: 32768
      maxTokens: 4096
      temperature: 0.1 # 0.3 — баланс точности и креативности для анализа требований (BA)
      topP: 0.9
      # reasoning: false
      # reasoningBudgetTokens: 0 # Если нужно гарантировать контроль затрат, задайте явное число (например, 2048).
