name: mistral:7b-main
version: 1.0.0
schema: v1

# Define which models can be used
# https://docs.continue.dev/customization/models
models:
  - name: mistral:7b-main
    provider: ollama
    model: mistral:7b
    #   apiKey: ${{ secrets.ANTHROPIC_API_KEY }}
    apiBase: http://localhost:11434
    roles:
      - chat
      # - autocomplete
      - edit
      - apply
      - summarize
      # - subagent
      # - rerank
      # - embed
    defaultCompletionOptions:
      contextLength: 16384 # Реалистично для 16 GB RAM
      maxTokens: 4096 # Для автодополнения обычно нужно 256-512. Для чата — 2048-4096 достаточно.
      temperature: 0.5 # Для креативных задач (brainstorming архитектора) можно 0.4-0.6.
      # presencePenalty: 1.2 # Защита от зацикливания в thinking
      # topK: 0.85
      # topP: 0.85
      stop:
        - </s>
        # - [INST]
        # - [/INST]
        # - \n\n # для autocomplete
    capabilities:
      - tool_use
      # - image_input

# Характеристики:

# Model
#   architecture        llama
#   parameters          7.2B
#   context length      32768
#   embedding length    4096
#   quantization        Q4_K_M

# Capabilities
#   completion
#   tools

# Parameters
#   stop    "[INST]"
#   stop    "[/INST]"

