name: qwen3.5:4b-c
version: 1.0.0
schema: v1

# Define which models can be used
# https://docs.continue.dev/customization/models
models:
  - name: qwen3.5:4b-c
    provider: ollama
    model: qwen3.5:4b
    #   apiKey: ${{ secrets.ANTHROPIC_API_KEY }}
    apiBase: http://localhost:11434
    roles:
      - chat
      # - autocomplete
      # - edit
      # - apply
      - summarize
      # - subagent
      # - rerank
      # - embed
    defaultCompletionOptions:
      contextLength: 8192 # 8192 # Реалистично для 16 GB RAM
      maxTokens: 2048 # Для автодополнения обычно нужно 256-512. Для чата — 2048-4096 достаточно.
      temperature: 0.3 # Для креативных задач (brainstorming архитектора) можно 0.4-0.6.
      # presencePenalty: 1.2 # Защита от зацикливания в thinking
      # topK: 0.85
      topP: 0.85
      stop:
        - </s>
        # - \n\n # для autocomplete
    capabilities:
      - tool_use
      - image_input

# Характеристики:

#   Model
#   architecture        qwen35
#   parameters          4.7B
#   context length      262144
#   embedding length    2560
#   quantization        Q4_K_M
#   requires            0.17.1

# Capabilities
#   completion
#   vision
#   tools
#   thinking

# Parameters
#   presence_penalty    1.5
#   temperature         1
#   top_k               20
#   top_p               0.95

