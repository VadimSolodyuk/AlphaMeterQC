name: Alice AI LLM Flash
version: 1.0.0
schema: v1

models:
  - name: Alice AI LLM Flash
    provider: openai
    model: gpt://${{ secrets.AISTUDIO__FOLDER_ID }}/aliceai-llm-flash/latest
    apiBase: https://ai.api.cloud.yandex.net/v1
    apiKey: ${{ secrets.AISTUDIO_API_KEY }}
    requestOptions:
      headers:
        OpenAI-Project: ${{ secrets.AISTUDIO__FOLDER_ID }}
    roles:
      - chat
      - edit
      - apply
    capabilities:
      - tool_use
    defaultCompletionOptions:
      temperature: 0.1 # 0.1 — точность для координации и контроля качества (PM)
      contextLength: 32768
      maxTokens: 4096
      topP: 0.9
      # reasoning_effort: "none"
