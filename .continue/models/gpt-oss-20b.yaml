name: gpt-oss-20b
version: 1.0.0
schema: v1

models:
  - name: gpt-oss-20b
    provider: openai
    model: gpt://${{ secrets.AISTUDIO__FOLDER_ID }}/gpt-oss-20b/latest
    apiBase: https://ai.api.cloud.yandex.net/v1
    apiKey: ${{ secrets.AISTUDIO_API_KEY }}
    requestOptions:
      headers:
        OpenAI-Project: ${{ secrets.AISTUDIO__FOLDER_ID }}
    roles:
      - chat
      - edit
      - apply
    capabilities:
      - tool_use
      - image_input
    defaultCompletionOptions:
      contextLength: 32768
      maxTokens: 4096
      temperature: 0.1 # 0.1 — точность для кода и QA (Dev-QA-DevOps)
      topP: 0.9
