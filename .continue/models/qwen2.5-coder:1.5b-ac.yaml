name: qwen2.5-coder:1.5b-ac
version: 1.0.0
schema: v1

# Define which models can be used
# https://docs.continue.dev/customization/models
models:
  - name: qwen2.5-coder:1.5b-ac
    provider: ollama
    model: qwen2.5-coder:1.5b
    #   apiKey: ${{ secrets.ANTHROPIC_API_KEY }}
    apiBase: http://localhost:11434
    roles:
      # - chat
      - autocomplete
      # - edit
      # - apply
      # - summarize
      # - subagent
      # - rerank
      # - embed
    autocompleteOptions:
      disable: false
      maxPromptTokens: 512
      debounceDelay: 250
      modelTimeout: 150
      maxSuffixPercentage: 0.2
      prefixPercentage: 0.3
      transform: true
      onlyMyCode: true
      useCache: true
      useImports: true
    defaultCompletionOptions:
      contextLength: 4096 #8192
      maxTokens: 256 # Для автодополнения обычно нужно 256-512. Для чата — 2048-4096 достаточно.
      temperature: 0.2 # Для креативных задач (brainstorming архитектора) можно 0.4-0.6.
      # topK: 0.85
      # topP: 0.85
      stop:
        - </s>
        - \n\n # для autocomplete
    capabilities: []
      # - completion
      # - tool_use
    #   - image_input

